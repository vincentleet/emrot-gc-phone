<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <title>WhatsApp</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Reset screen (shows briefly on load, then fades to chat) -->
  <div id="reset-screen" class="screen reset-screen active">
    <p class="reset-message">Gangster Chase phone has now been reset.</p>
  </div>

  <!-- Chat screen -->
  <div id="chat-screen" class="screen">
    <div class="chat-container">
      <div class="chat-scroll-area">
        <header class="chat-header">
          <button class="header-back" aria-label="Back">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
          </button>
          <div class="header-avatar" id="header-avatar"></div>
          <div class="header-info">
            <h1 class="header-name" id="header-name">Jimmy</h1>
            <span class="header-status" id="header-status">online</span>
          </div>
          <div class="header-actions">
            <button class="header-icon" aria-label="Video call" type="button"><svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg></button>
            <button class="header-icon" aria-label="Voice call" type="button"><svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></button>
            <button class="header-icon" aria-label="Menu" type="button"><svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></button>
          </div>
        </header>

        <main class="chat-messages" id="chat-messages">
          <!-- Messages rendered by JS -->
        </main>
      </div>

      <div class="chat-input-bar">
        <button class="input-emoji" aria-label="Emoji">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
        </button>
        <input type="text" class="input-field" placeholder="Message" disabled>
        <button class="input-voice" aria-label="Voice note" title="Voice note" type="button">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Decision modal -->
  <div id="decision-modal" class="modal-overlay" aria-hidden="true">
    <div class="modal-card">
      <h2 class="modal-title">What do you want to do?</h2>
      <form id="decision-form" class="modal-form">
        <label class="modal-option">
          <input type="radio" name="choice" value="call_police">
          <span>Call the police to report what you have found.</span>
        </label>
        <label class="modal-option">
          <input type="radio" name="choice" value="escape_with_jimmy">
          <span>Respond to Jimmy telling him you want to attempt to escape with the stolen goods.</span>
        </label>
      </form>
      <button type="button" id="modal-select" class="modal-select-btn" disabled>Select</button>
    </div>
  </div>

  <!-- Incoming call overlay -->
  <div id="incoming-call" class="call-overlay" aria-hidden="true">
    <div class="call-incoming">
      <div class="call-avatar" id="call-avatar"></div>
      <h2 class="call-name" id="call-name">Rotorua Police</h2>
      <p class="call-status">Incoming call</p>
      <div class="call-actions">
        <button id="call-decline" class="call-btn call-decline" aria-label="Decline">
          <span class="call-btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 122.88 122.88" width="24" height="24" fill="currentColor"><path fill-rule="evenodd" d="M74.59,55.72a49.79,49.79,0,0,0-12.38-2.07A41.52,41.52,0,0,0,48,55.8a1.16,1.16,0,0,0-.74.67,4.53,4.53,0,0,0-.27,1.7,16.14,16.14,0,0,0,.2,2c.42,3,.93,6.8-2.42,8l-.22.07-12,3.24-.12,0A4.85,4.85,0,0,1,28,70a11.44,11.44,0,0,1-2.68-4.92,11,11,0,0,1,.42-6.93A23.69,23.69,0,0,1,29,52.39,21.52,21.52,0,0,1,36.55,46a42.74,42.74,0,0,1,10.33-3.6l.29-.07C49,42,51,41.48,53.08,41.17a62.76,62.76,0,0,1,25.14,1.59c6.87,2,13,5.43,16.8,10.7a13.88,13.88,0,0,1,2.92,9.59,12.64,12.64,0,0,1-4.88,8.43,1.34,1.34,0,0,1-1.26.28L78.6,68.38A3.69,3.69,0,0,1,75.41,66a7.73,7.73,0,0,1-.22-4,15.21,15.21,0,0,1,.22-1.6c.3-1.89.63-4.06-.89-4.72Z"/></svg>
          </span>
          <span>Decline</span>
        </button>
        <button id="call-answer" class="call-btn call-answer" aria-label="Answer">
          <span class="call-btn-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
          </span>
          <span>Answer</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Active call overlay (speakerphone) -->
  <div id="active-call" class="call-overlay" aria-hidden="true">
    <div class="call-active">
      <div class="call-timer" id="call-timer">0:00</div>
      <div class="call-active-avatar" id="active-call-avatar"></div>
      <h2 class="call-active-name" id="active-call-name">Rotorua Police</h2>
      <p class="call-active-status">
        <span class="speaker-icon" aria-label="Speaker">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </span>
        Speaker
      </p>
      <button id="call-end" class="call-end-btn" aria-label="End call">End call</button>
      <audio id="call-audio" preload="auto"></audio>
    </div>
  </div>

  <script src="js/conv.js"></script>
  <script src="js/typing.js"></script>
  <script src="js/call.js"></script>
  <script src="js/firebase-logger.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
