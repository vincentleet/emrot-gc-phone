<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Edit Messages</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; max-width: 640px; }
    h1 { font-size: 1.25rem; margin: 0 0 16px; }
    .section { margin-bottom: 24px; }
    .section h2 { font-size: 0.9rem; color: #667781; margin: 0 0 8px; font-weight: 600; }
    .message-row { margin-bottom: 12px; }
    .message-row label { display: block; font-size: 0.75rem; color: #667781; margin-bottom: 4px; }
    .message-row input, .message-row textarea { width: 100%; padding: 8px 12px; font-size: 0.95rem; border: 1px solid #ddd; border-radius: 6px; }
    .message-row textarea { min-height: 60px; resize: vertical; }
    .from-badge { display: inline-block; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-left: 4px; }
    .from-player { background: #D9FDD3; }
    .from-jimmy { background: #E8F4FD; }
    .from-police { background: #E3F2FD; }
    .btn { padding: 10px 20px; font-size: 0.95rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; }
    .btn-save { background: #25D366; color: #fff; }
    .btn-save:hover { background: #20BD5A; }
    .btn-reset { background: #eee; color: #333; margin-left: 8px; }
    .btn-reset:hover { background: #ddd; }
    .btn-download { background: #128C7E; color: #fff; margin-left: 8px; }
    .btn-download:hover { background: #0e7a6d; }
    .actions { margin-top: 24px; }
    .help { font-size: 0.85rem; color: #666; margin-top: 12px; max-width: 420px; }
    .to-app { font-size: 0.85rem; margin-top: 16px; }
    .to-app a { color: #25D366; }
  </style>
</head>
<body>
  <h1>Edit Messages</h1>
  <div id="admin-form"></div>
  <div class="actions">
    <button type="button" class="btn btn-save" id="save-btn">Save (this device)</button>
    <button type="button" class="btn btn-download" id="download-btn">Download conv-edits.json</button>
    <button type="button" class="btn btn-reset" id="reset-btn">Reset to default</button>
  </div>
  <p class="help">To sync edits to other devices: click &quot;Download conv-edits.json&quot;, replace the file in your project directory, then deploy. All devices will get changes after reload.</p>
  <p class="to-app"><a href="index.html">← Back to app</a></p>

  <script src="js/conv.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
